name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (stdlib unittest, zero deps)
        run: python -m unittest discover -s tests -t .
      - name: Smoke test CLI
        run: |
          python -m peakstar_dataready scan examples/sample_docs --out dr-smoke-out --lang en
